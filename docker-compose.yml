

# Single-container setup — FastAPI serves BOTH the API and the frontend HTML.
# No nginx image needed. Solves Docker Hub network timeout issues.

services:

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: candidateos:latest
    container_name: candidateos
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EXTRACT_MODEL=${OPENAI_EXTRACT_MODEL:-gpt-4o-mini}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s